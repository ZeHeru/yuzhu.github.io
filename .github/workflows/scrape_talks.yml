name: Scrape Talk Locations

on:
  push:
    paths:
      - '_talks/**'
      - 'talkmap.ipynb'
      - 'talkmap.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install jupyter pandas requests beautifulsoup4 geopy getorg

    - name: Run Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add talkmap_out.ipynb talkmap/map.html talkmap/org-locations.js
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Automated update of talk locations"
          git push
        fi
